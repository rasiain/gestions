; Xdebug configuration for development
zend_extension=xdebug.so

; Mode is controlled by XDEBUG_MODE env var in docker-compose (off by default)
; To enable: XDEBUG_MODE=debug dcup app

; Start debugging only when XDEBUG_TRIGGER is present in the request
xdebug.start_with_request=trigger

; Client settings (VSCode on host machine)
xdebug.client_host=host.docker.internal
xdebug.client_port=9010

; Logging (helpful for troubleshooting)
xdebug.log=/tmp/xdebug.log
xdebug.log_level=7

; IDE key
xdebug.idekey=VSCODE
